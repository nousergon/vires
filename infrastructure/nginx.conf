# Vires nginx site — installed to /etc/nginx/conf.d/vires.conf on the shared box.
# Self-contained (its own conf file) so it never touches the dashboard-owned
# nousergon.conf. Cloudflare (orange-cloud) terminates the public edge and
# connects to this origin over 443 using the existing *.nousergon.ai origin cert.
#
# vires.nousergon.ai itself is now the marketing/waitlist Pages site (root) with
# a Cloudflare Worker (vires-app-proxy) forwarding /app* to THIS origin's own
# hostname, vires-app.nousergon.ai — not the public domain. The app is fully
# namespaced under /app (Vite `base`, FastAPI routers) so this origin never
# needs to see the public hostname or handle a bare "/" from real traffic.
#
# TRANSITION ALIAS: vires.nousergon.ai is also matched here, temporarily. DNS for
# that hostname still points directly at this box (A record) until the Cloudflare
# Pages custom-domain + Worker cutover lands — dropping this server_name here
# first (as PR#135 did) left NO nginx block matching the live DNS record, so
# every request fell through to nginx's implicit default_server (a co-tenant's
# config, not this app) — a real outage caught and hotfixed live 2026-07-18.
# Safe to drop this alias once the Cloudflare cutover moves vires.nousergon.ai's
# DNS off this box entirely (Worker forwards using Host: vires-app.nousergon.ai
# regardless, so real traffic never depends on this alias post-cutover).
server {
    listen 80;
    server_name vires-app.nousergon.ai vires.nousergon.ai;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name vires-app.nousergon.ai vires.nousergon.ai;

    ssl_certificate     /etc/ssl/certs/cloudflare-origin.pem;
    ssl_certificate_key /etc/ssl/private/cloudflare-origin.key;

    # Defensive only — real traffic always arrives via the Worker with /app
    # already in the path. Canonical app URL is vires.nousergon.ai/app (vires-ops#61).
    location = / { return 301 https://$host/app/; }

    location / {
        proxy_pass http://127.0.0.1:8530;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
