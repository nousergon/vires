# Standard fleet Dependabot config (weekly, grouped minor+patch) — alpha-engine-config-I2525
# Majors bundled + delayed via cooldown (NOT a second schedule block — Dependabot
# v2 requires a unique (ecosystem, directory, target-branch) combination per
# `updates:` entry; two blocks for the same ecosystem+directory is a schema
# violation ("Update configs must have a unique combination..."), which is what
# broke this file — repo-wide Dependabot updates were silently disabled.
# cooldown.semver-major-days delays major-bump PRs ~monthly without a second
# schedule block. — alpha-engine-config-I2734
version: 2
updates:
  - package-ecosystem: uv
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
    cooldown:
      semver-major-days: 30

  - package-ecosystem: npm
    directory: "/web"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
    cooldown:
      semver-major-days: 30

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
      majors:
        update-types:
          - major
    cooldown:
      semver-major-days: 30
