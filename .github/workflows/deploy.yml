name: Deploy Vires via SSM

# Two stages: (1) build the React PWA on a clean linux runner and upload the
# bundle to S3; (2) SSM to the host, which pulls this repo, fetches the prebuilt
# bundle, and runs deploy-on-merge.sh (deps, migrate, seed, nginx/systemd,
# restart, health). The host never builds the frontend — CI owns the build.
#
# Configure once (repo Settings → Secrets and variables → Actions → Variables):
#   AWS_DEPLOY_ROLE_ARN  – IAM role to assume via OIDC
#   VIRES_INSTANCE_ID    – EC2 instance id to deploy to
#   VIRES_DIST_S3        – s3:// path for the built web bundle

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: vires-deploy
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  build-web:
    name: Build PWA + upload bundle
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "20"
      - name: Build
        working-directory: web
        run: |
          npm ci
          npm run build
      - name: Package bundle
        run: tar -czf web-dist.tgz -C web/dist .
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - name: Upload bundle to S3
        run: aws s3 cp web-dist.tgz "${{ vars.VIRES_DIST_S3 }}"

  deploy:
    name: Deploy Vires via SSM
    needs: build-web
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      VIRES_INSTANCE_ID: ${{ vars.VIRES_INSTANCE_ID }}
      VIRES_DIST_S3: ${{ vars.VIRES_DIST_S3 }}
    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1

      - name: Send SSM deploy command
        id: send
        run: |
          set -euo pipefail
          # Pass the bundle location to the host script via env (kept out of source).
          CMD_BODY="flock -w 600 /tmp/vires-deploy.lock -c 'set -e; sudo -u ec2-user -H git -C /home/ec2-user/vires fetch origin --quiet && sudo -u ec2-user -H git -C /home/ec2-user/vires reset --hard ${GITHUB_SHA} --quiet && sudo -u ec2-user -H VIRES_DIST_S3=${VIRES_DIST_S3} bash /home/ec2-user/vires/infrastructure/deploy-on-merge.sh'"
          CMD_ID=$(aws ssm send-command \
            --instance-ids "${VIRES_INSTANCE_ID}" \
            --document-name AWS-RunShellScript \
            --comment "vires deploy ${GITHUB_SHA}" \
            --parameters "commands=[\"${CMD_BODY}\"]" \
            --query 'Command.CommandId' \
            --output text)
          echo "command_id=${CMD_ID}" >> "$GITHUB_OUTPUT"
          echo "Sent SSM command: ${CMD_ID}"

      - name: Wait for SSM command to finish
        run: |
          aws ssm wait command-executed \
            --instance-id "${VIRES_INSTANCE_ID}" \
            --command-id "${{ steps.send.outputs.command_id }}" || true

      - name: Fetch deploy output
        if: always()
        run: |
          set +e
          STATUS=$(aws ssm get-command-invocation \
            --instance-id "${VIRES_INSTANCE_ID}" \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query '[Status,ResponseCode]' --output text)
          echo "Status: ${STATUS}"
          echo "── stdout ──"
          aws ssm get-command-invocation \
            --instance-id "${VIRES_INSTANCE_ID}" \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query 'StandardOutputContent' --output text
          echo "── stderr ──"
          aws ssm get-command-invocation \
            --instance-id "${VIRES_INSTANCE_ID}" \
            --command-id "${{ steps.send.outputs.command_id }}" \
            --query 'StandardErrorContent' --output text
          echo "${STATUS}" | grep -q "^Success" || exit 1
