name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - name: Skip if web/ not present
        id: guard
        run: |
          if [ -f package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.present == 'true'
        with:
          node-version: "20"

      - name: Install
        if: steps.guard.outputs.present == 'true'
        run: npm ci

      - name: Lint
        if: steps.guard.outputs.present == 'true'
        run: npm run lint

      - name: Test
        if: steps.guard.outputs.present == 'true'
        run: npm run test

      - name: Typecheck + build
        if: steps.guard.outputs.present == 'true'
        run: npm run build
