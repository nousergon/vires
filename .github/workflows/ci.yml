name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          python-version: "3.13"

      - name: Sync dependencies
        run: uv sync

      - name: Lint
        run: uv run ruff check .

      - name: Test (with coverage gate, fail_under in pyproject)
        run: uv run pytest --cov=api --cov-report=xml --cov-report=term

      - name: Upload backend coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-backend
          path: coverage.xml
          retention-days: 1

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Skip if web/ not present
        id: guard
        run: |
          if [ -f package.json ]; then echo "present=true" >> "$GITHUB_OUTPUT"; else echo "present=false" >> "$GITHUB_OUTPUT"; fi

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        if: steps.guard.outputs.present == 'true'
        with:
          node-version: "20"

      - name: Install
        if: steps.guard.outputs.present == 'true'
        run: npm ci

      - name: Lint
        if: steps.guard.outputs.present == 'true'
        run: npm run lint

      - name: Test (with coverage gate, thresholds in vitest.config)
        if: steps.guard.outputs.present == 'true'
        run: npm run test -- --coverage

      - name: Upload frontend coverage
        if: steps.guard.outputs.present == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-frontend
          path: web/coverage/cobertura-coverage.xml
          retention-days: 1

      - name: Typecheck + build
        if: steps.guard.outputs.present == 'true'
        run: npm run build

  # Self-hosted coverage badges: generate SVGs from the coverage reports and
  # commit them to the `badges` branch (served via raw.githubusercontent in the
  # README). No third-party coverage service. Only on push to main.
  badges:
    needs: [backend, frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-backend
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: coverage-frontend
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7
        with:
          python-version: "3.13"
      - name: Generate badge SVGs
        run: |
          pip install "genbadge[coverage]"
          genbadge coverage -i coverage.xml -o coverage-backend.svg -n "backend coverage"
          genbadge coverage -i cobertura-coverage.xml -o coverage-frontend.svg -n "frontend coverage"
      - name: Publish to the badges branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin badges --depth=1 2>/dev/null || true
          back=$(git hash-object -w coverage-backend.svg)
          front=$(git hash-object -w coverage-frontend.svg)
          tree=$(printf '100644 blob %s\tcoverage-backend.svg\n100644 blob %s\tcoverage-frontend.svg\n' "$back" "$front" | git mktree)
          parent=$(git rev-parse --verify -q origin/badges || true)
          if [ -n "$parent" ] && [ "$(git rev-parse "origin/badges^{tree}")" = "$tree" ]; then
            echo "coverage badges unchanged"; exit 0
          fi
          if [ -n "$parent" ]; then
            commit=$(git commit-tree "$tree" -p "$parent" -m "ci: update coverage badges [skip ci]")
          else
            commit=$(git commit-tree "$tree" -m "ci: seed coverage badges [skip ci]")
          fi
          git push origin "$commit:refs/heads/badges"
