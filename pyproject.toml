[project]
name = "vires"
version = "0.1.0"
description = "Strength-training tracker with hybrid exercise search."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "AGPL-3.0-only" }
authors = [{ name = "Brian McMahon", email = "brian@nousergon.ai" }]
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.34",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "fastembed>=0.4",
    "numpy>=1.26",
    "httpx>=0.27",
    "anthropic>=0.40",
    "pywebpush>=1.14",
]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.6",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["api"]

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["alembic/versions"]  # autogenerated migrations

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI Depends()/Query() in defaults is the intended idiom

[tool.pytest.ini_options]
addopts = "-q"
testpaths = ["tests"]
